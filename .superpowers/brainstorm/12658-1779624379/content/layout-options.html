<h2>左右分栏布局方案对比</h2>
<p class="subtitle">左侧固定筛选区 + 右侧题目列表，考虑操作习惯和空间利用</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>左侧筛选 + 右侧列表（推荐）</h3>
      <p>左侧 260px 固定筛选栏（年份/省份/题型，点击即查询），右侧题目卡片列表 + 分页。筛选和结果同屏，操作流畅。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>顶部筛选栏 + 下方左右分栏</h3>
      <p>顶部横向筛选条件，下方左侧题目列表、右侧题目详情。适合快速浏览，但不适合你的"筛选也查数据"需求。</p>
    </div>
  </div>
</div>
